# Supabase Configuration
# This file is used by Supabase CLI for local development and deployment

[api]
# API settings
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
# Database settings
port = 54322
shadow_port = 54320
major_version = 17

[studio]
# Supabase Studio settings
enabled = true
port = 54323

[inbucket]
# Email testing (local development)
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
# Storage settings
file_size_limit = "50MiB"

[auth]
[auth.password]
leaked_password_protection = "error"

# Per-function settings (slugs match supabase/functions/* folder names)
[functions.import-inventory]
verify_jwt = false

[functions.create-sale]
verify_jwt = false

[functions.create-card-checkout]
verify_jwt = false

[functions.payment-ipn]
verify_jwt = false

[functions.payment-return-success]
verify_jwt = false

[functions.payment-return-cancel]
verify_jwt = false

[functions.payment-return-fail]
verify_jwt = false