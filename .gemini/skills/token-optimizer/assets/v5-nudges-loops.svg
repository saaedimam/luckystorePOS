<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <!--
    Quality Nudges + Loop Detection: show a session with a quality drop
    and a loop being caught in real time.
    10s loop. Catppuccin Mocha palette. Pure SMIL animations.
  -->

  <!-- Background -->
  <rect width="800" height="480" rx="12" fill="#1e1e2e"/>

  <!-- Title -->
  <text x="400" y="38" fill="#a6e3a1" font-family="'SF Mono','Fira Code',monospace" font-size="20" font-weight="bold" text-anchor="middle">Quality Nudges + Loop Detection</text>
  <text x="400" y="60" fill="#a6adc8" font-family="'SF Mono','Fira Code',monospace" font-size="12" text-anchor="middle">Warns you in real time before context rot or AI loops burn through tokens. Zero risk.</text>

  <!-- Session timeline with quality score -->
  <g>
    <text x="40" y="96" fill="#cdd6f4" font-family="'SF Mono','Fira Code',monospace" font-size="13" font-weight="bold">Your session, quality score over time</text>

    <!-- Y-axis labels -->
    <text x="34" y="124" fill="#585b70" font-family="'SF Mono','Fira Code',monospace" font-size="10" text-anchor="end">100</text>
    <text x="34" y="156" fill="#585b70" font-family="'SF Mono','Fira Code',monospace" font-size="10" text-anchor="end">75</text>
    <text x="34" y="188" fill="#585b70" font-family="'SF Mono','Fira Code',monospace" font-size="10" text-anchor="end">60</text>
    <text x="34" y="220" fill="#585b70" font-family="'SF Mono','Fira Code',monospace" font-size="10" text-anchor="end">40</text>
    <text x="34" y="252" fill="#585b70" font-family="'SF Mono','Fira Code',monospace" font-size="10" text-anchor="end">0</text>

    <!-- Chart area -->
    <rect x="40" y="108" width="720" height="152" fill="#181825"/>

    <!-- Gridlines -->
    <line x1="40" y1="152" x2="760" y2="152" stroke="#313244" stroke-width="1" stroke-dasharray="2,3"/>
    <line x1="40" y1="184" x2="760" y2="184" stroke="#f9e2af" stroke-width="1" stroke-dasharray="2,3" opacity="0.5"/>
    <line x1="40" y1="216" x2="760" y2="216" stroke="#f38ba8" stroke-width="1" stroke-dasharray="2,3" opacity="0.5"/>

    <!-- Threshold labels -->
    <text x="760" y="182" fill="#f9e2af" font-family="'SF Mono','Fira Code',monospace" font-size="9" text-anchor="end">nudge threshold (60)</text>

    <!-- Quality curve: starts at 95, drops gradually, then sharp drop, then warning triggers /compact -->
    <path d="M 40 116 L 120 120 L 200 128 L 280 140 L 360 148 L 440 164 L 520 184"
          stroke="#a6e3a1" stroke-width="3" fill="none" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1;1" keyTimes="0;0.08;0.15;0.60;0.90;1" dur="10s" repeatCount="indefinite"/>
    </path>

    <!-- Sharp drop below threshold -->
    <path d="M 520 184 L 560 200 L 600 208"
          stroke="#f38ba8" stroke-width="3" fill="none" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1;1" keyTimes="0;0.15;0.22;0.60;0.90;1" dur="10s" repeatCount="indefinite"/>
    </path>

    <!-- Nudge warning bubble appears -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1;1" keyTimes="0;0.25;0.32;0.60;0.90;1" dur="10s" repeatCount="indefinite"/>
      <path d="M 600 208 L 620 190" stroke="#f9e2af" stroke-width="2" stroke-dasharray="3,2"/>
      <rect x="620" y="130" width="135" height="60" rx="6" fill="#1e1e2e" stroke="#f9e2af" stroke-width="2"/>
      <text x="628" y="148" fill="#f9e2af" font-family="'SF Mono','Fira Code',monospace" font-size="10" font-weight="bold">[Token Optimizer]</text>
      <text x="628" y="162" fill="#cdd6f4" font-family="'SF Mono','Fira Code',monospace" font-size="9">Quality dropped to 58</text>
      <text x="628" y="174" fill="#cdd6f4" font-family="'SF Mono','Fira Code',monospace" font-size="9">(was 85). Consider</text>
      <text x="628" y="184" fill="#89dceb" font-family="'SF Mono','Fira Code',monospace" font-size="9">/compact to protect.</text>
    </g>

    <!-- User /compact action, score recovers -->
    <path d="M 600 208 L 640 124"
          stroke="#89dceb" stroke-width="3" fill="none" stroke-dasharray="5,3" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1;1" keyTimes="0;0.40;0.47;0.60;0.90;1" dur="10s" repeatCount="indefinite"/>
    </path>

    <!-- "/compact fired" label -->
    <text x="680" y="116" fill="#89dceb" font-family="'SF Mono','Fira Code',monospace" font-size="10" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1;1" keyTimes="0;0.42;0.49;0.60;0.90;1" dur="10s" repeatCount="indefinite"/>
      /compact fired
    </text>
    <text x="680" y="130" fill="#a6e3a1" font-family="'SF Mono','Fira Code',monospace" font-size="10" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1;1" keyTimes="0;0.42;0.49;0.60;0.90;1" dur="10s" repeatCount="indefinite"/>
      quality: 96/100
    </text>

    <!-- Time axis label -->
    <text x="400" y="280" fill="#585b70" font-family="'SF Mono','Fira Code',monospace" font-size="10" text-anchor="middle">turns &#8594;</text>
  </g>

  <!-- Loop detection example -->
  <g transform="translate(0, 304)">
    <text x="40" y="20" fill="#cdd6f4" font-family="'SF Mono','Fira Code',monospace" font-size="13" font-weight="bold">Loop caught before it burned tokens</text>

    <!-- Tool call history -->
    <rect x="40" y="32" width="480" height="130" rx="6" fill="#181825"/>
    <text x="52" y="52" fill="#585b70" font-family="'SF Mono','Fira Code',monospace" font-size="10">Turn 14:  Bash("pytest tests/test_auth.py")</text>
    <text x="506" y="52" fill="#f38ba8" font-family="'SF Mono','Fira Code',monospace" font-size="10" text-anchor="end">FAILED</text>
    <text x="52" y="72" fill="#585b70" font-family="'SF Mono','Fira Code',monospace" font-size="10">Turn 15:  Bash("pytest tests/test_auth.py")</text>
    <text x="506" y="72" fill="#f38ba8" font-family="'SF Mono','Fira Code',monospace" font-size="10" text-anchor="end">FAILED</text>
    <text x="52" y="92" fill="#585b70" font-family="'SF Mono','Fira Code',monospace" font-size="10">Turn 16:  Bash("pytest tests/test_auth.py")</text>
    <text x="506" y="92" fill="#f38ba8" font-family="'SF Mono','Fira Code',monospace" font-size="10" text-anchor="end">FAILED</text>
    <text x="52" y="118" fill="#f9e2af" font-family="'SF Mono','Fira Code',monospace" font-size="11" font-weight="bold">[Token Optimizer] Possible retry loop:</text>
    <text x="52" y="134" fill="#cdd6f4" font-family="'SF Mono','Fira Code',monospace" font-size="11">3 similar short results in recent tool calls.</text>
    <text x="52" y="150" fill="#cdd6f4" font-family="'SF Mono','Fira Code',monospace" font-size="11">The same approach may keep failing.</text>

    <!-- Arrow to savings -->
    <path d="M 530 96 L 570 96" stroke="#89dceb" stroke-width="2"/>
    <path d="M 564 90 L 572 96 L 564 102" stroke="#89dceb" stroke-width="2" fill="none"/>

    <!-- Savings box -->
    <rect x="580" y="44" width="180" height="108" rx="6" fill="#181825" stroke="#a6e3a1" stroke-width="2"/>
    <text x="670" y="66" fill="#a6e3a1" font-family="'SF Mono','Fira Code',monospace" font-size="12" font-weight="bold" text-anchor="middle">Without detection</text>
    <text x="670" y="88" fill="#f38ba8" font-family="'SF Mono','Fira Code',monospace" font-size="22" font-weight="bold" text-anchor="middle">~47K tokens</text>
    <text x="670" y="108" fill="#585b70" font-family="'SF Mono','Fira Code',monospace" font-size="10" text-anchor="middle">burned on avg loop</text>
    <text x="670" y="132" fill="#a6e3a1" font-family="'SF Mono','Fira Code',monospace" font-size="11" font-weight="bold" text-anchor="middle">caught: +8%</text>
  </g>
</svg>
