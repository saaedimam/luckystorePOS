    </text>
    <text x="345" y="28" fill="#a6e3a1" font-family="'SF Mono','Fira Code',monospace" font-size="11" text-anchor="end" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1;1;1" keyTimes="0;0.22;0.30;0.30;0.85;0.95;1" dur="12s" repeatCount="indefinite"/>
      on
    </text>
    <text x="16" y="50" fill="#cdd6f4" font-family="'SF Mono','Fira Code',monospace" font-size="11" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1;1;1" keyTimes="0;0.22;0.30;0.30;0.85;0.95;1" dur="12s" repeatCount="indefinite"/>
