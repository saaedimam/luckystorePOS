    </text>
    <text x="345" y="28" fill="#a6adc8" font-family="'SF Mono','Fira Code',monospace" font-size="11" text-anchor="end" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1;1;1" keyTimes="0;0.18;0.26;0.30;0.85;0.95;1" dur="12s" repeatCount="indefinite"/>
