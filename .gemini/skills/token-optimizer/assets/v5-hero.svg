    </text>
    <text x="345" y="92" fill="#a6adc8" font-family="'SF Mono','Fira Code',monospace" font-size="10" text-anchor="end" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1;1;1" keyTimes="0;0.22;0.30;0.30;0.85;0.95;1" dur="12s" repeatCount="indefinite"/>
      moderate risk &#183; lossy
    </text>
  </g>

  <!-- Bottom summary bar -->
  <g transform="translate(30, 356)">
    <rect width="740" height="110" rx="8" fill="#181825" stroke="#45475a" stroke-width="1" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1;1;1" keyTimes="0;0.30;0.40;0.50;0.85;0.95;1" dur="12s" repeatCount="indefinite"/>
    </rect>
    <text x="370" y="32" fill="#cdd6f4" font-family="'SF Mono','Fira Code',monospace" font-size="14" font-weight="bold" text-anchor="middle" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1;1;1" keyTimes="0;0.32;0.42;0.50;0.85;0.95;1" dur="12s" repeatCount="indefinite"/>
