    </text>
  </g>

  <!-- Feature 5: Bash Compression (ON by default since v5.5) -->
  <g transform="translate(405, 218)">
    <rect width="365" height="110" rx="8" fill="#313244" stroke="#a6e3a1" stroke-width="2" stroke-dasharray="4,3" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1;1;1" keyTimes="0;0.20;0.28;0.30;0.85;0.95;1" dur="12s" repeatCount="indefinite"/>
    </rect>
    <text x="16" y="28" fill="#a6e3a1" font-family="'SF Mono','Fira Code',monospace" font-size="13" font-weight="bold" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1;1;1" keyTimes="0;0.22;0.30;0.30;0.85;0.95;1" dur="12s" repeatCount="indefinite"/>
