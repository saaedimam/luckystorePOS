    </text>
    <text x="16" y="92" fill="#89dceb" font-family="'SF Mono','Fira Code',monospace" font-size="14" font-weight="bold" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1;1;1" keyTimes="0;0.14;0.22;0.30;0.85;0.95;1" dur="12s" repeatCount="indefinite"/>
      +20% saved
    </text>
    <text x="220" y="92" fill="#a6adc8" font-family="'SF Mono','Fira Code',monospace" font-size="10" text-anchor="end" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1;1;1" keyTimes="0;0.14;0.22;0.30;0.85;0.95;1" dur="12s" repeatCount="indefinite"/>
      low risk
    </text>
  </g>

  <!-- Feature 4: Local Measurement (replaces "telemetry") -->
  <g transform="translate(30, 218)">
    <rect width="365" height="110" rx="8" fill="#313244" stroke="#585b70" stroke-width="2" stroke-dasharray="4,3" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1;1;1" keyTimes="0;0.16;0.24;0.30;0.85;0.95;1" dur="12s" repeatCount="indefinite"/>
    </rect>
    <text x="16" y="28" fill="#cdd6f4" font-family="'SF Mono','Fira Code',monospace" font-size="13" font-weight="bold" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1;1;1" keyTimes="0;0.18;0.26;0.30;0.85;0.95;1" dur="12s" repeatCount="indefinite"/>
