    </text>
    <text x="370" y="100" fill="#a6e3a1" font-family="'SF Mono','Fira Code',monospace" font-size="11" text-anchor="middle" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1;1;1" keyTimes="0;0.44;0.54;0.64;0.85;0.95;1" dur="12s" repeatCount="indefinite"/>
