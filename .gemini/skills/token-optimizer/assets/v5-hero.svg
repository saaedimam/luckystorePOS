    </text>
    <text x="220" y="28" fill="#89dceb" font-family="'SF Mono','Fira Code',monospace" font-size="11" font-weight="bold" text-anchor="end" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1;1;1" keyTimes="0;0.14;0.22;0.30;0.85;0.95;1" dur="12s" repeatCount="indefinite"/>
      ON
    </text>
    <text x="16" y="50" fill="#cdd6f4" font-family="'SF Mono','Fira Code',monospace" font-size="11" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1;1;1" keyTimes="0;0.14;0.22;0.30;0.85;0.95;1" dur="12s" repeatCount="indefinite"/>
      File re-read after edit?
    </text>
    <text x="16" y="66" fill="#cdd6f4" font-family="'SF Mono','Fira Code',monospace" font-size="11" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1;1;1" keyTimes="0;0.14;0.22;0.30;0.85;0.95;1" dur="12s" repeatCount="indefinite"/>
