    </text>
    <text x="370" y="56" fill="#a6adc8" font-family="'SF Mono','Fira Code',monospace" font-size="12" text-anchor="middle" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1;1;1" keyTimes="0;0.34;0.44;0.50;0.85;0.95;1" dur="12s" repeatCount="indefinite"/>
      Quality Nudges + Loop Detection + Delta Mode = ready on first session
    </text>
    <text x="370" y="82" fill="#89dceb" font-family="'SF Mono','Fira Code',monospace" font-size="12" font-weight="bold" text-anchor="middle" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1;1;1" keyTimes="0;0.40;0.50;0.60;0.85;0.95;1" dur="12s" repeatCount="indefinite"/>
