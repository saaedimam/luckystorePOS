<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LuckyPOS — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f5f5;
      color: #333;
    }
    .offline-card {
      text-align: center;
      padding: 48px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      max-width: 400px;
    }
    .offline-card svg { margin-bottom: 16px; opacity: 0.4; }
    .offline-card h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .offline-card p { font-size: 14px; color: #666; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="offline-card">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#863bff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="2" y1="2" x2="22" y2="22" />
      <path d="M8.5 16.5a5 5 0 0 1 7 0" />
      <path d="M2 8.82a14.5 14.5 0 0 1 4.4-3.4" />
      <path d="M5 12.5a10 10 0 0 1 2.8-3" />
      <circle cx="12" cy="12" r="10" />
    </svg>
    <h1>You're Offline</h1>
    <p>LuckyPOS can't reach the server right now. Check your connection and try again.</p>
  </div>
</body>
</html>
