<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clear Cache - Lucky Store</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 { color: #333; margin-top: 0; }
    button {
      background: #D4A843;
      color: #0F172A;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin: 10px 0;
      display: block;
      width: 100%;
    }
    button:hover { background: #C29837; }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .status {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      background: #f0f0f0;
      font-family: monospace;
      font-size: 13px;
      white-space: pre-wrap;
    }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    .info { background: #d1ecf1; color: #0c5460; }
    ul { text-align: left; }
    li { margin: 5px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧹 Clear Storefront Cache</h1>
    <p>If you're seeing old data or UI, use these buttons to clear all cached state:</p>

    <button onclick="clearLocalStorage()">Clear localStorage (Cart Data)</button>
    <button onclick="clearIndexedDB()">Clear IndexedDB (App State)</button>
    <button onclick="unregisterServiceWorkers()">Unregister Service Workers</button>
    <button onclick="clearAllCaches()">Clear All Caches</button>
    <button onclick="clearEverything()" style="background: #dc3545; color: white;">⚠️ Clear EVERYTHING</button>

    <p><a href="/">← Back to Storefront</a></p>

    <div id="status" class="status" style="display: none;"></div>
  </div>

  <script>
    function showStatus(message, type = 'info') {
      const status = document.getElementById('status');
      status.textContent = message;
      status.className = 'status ' + type;
      status.style.display = 'block';
      console.log('[ClearCache]', message);
    }

    // Clear localStorage (Zustand cart state)
    function clearLocalStorage() {
      try {
        const keys = Object.keys(localStorage);
        let cleared = [];
        keys.forEach(key => {
          if (key.includes('lucky') || key.includes('zustand') || key.includes('persist')) {
            localStorage.removeItem(key);
            cleared.push(key);
          }
        });
        showStatus('✅ localStorage cleared:\n' + (cleared.join('\n') || 'No matching keys found'), 'success');
      } catch (err) {
        showStatus('❌ Error: ' + err.message, 'error');
      }
    }

    // Clear IndexedDB databases
    async function clearIndexedDB() {
      try {
        const databases = await window.indexedDB?.databases?.() || [];
        let cleared = [];

        for (const db of databases) {
          if (db.name) {
            await new Promise((resolve, reject) => {
              const req = window.indexedDB.deleteDatabase(db.name);
              req.onsuccess = () => resolve();
              req.onerror = () => reject(req.error);
            });
            cleared.push(db.name);
          }
        }

        // Also try common database names
        const commonNames = ['luckystore-db', 'supabase', 'zustand', 'workbox'];
        for (const name of commonNames) {
          try {
            await new Promise((resolve) => {
              const req = window.indexedDB.deleteDatabase(name);
              req.onsuccess = () => resolve();
              req.onerror = () => resolve(); // Ignore errors for non-existent DBs
            });
          } catch (e) {}
        }

        showStatus('✅ IndexedDB cleared:\n' + (cleared.join('\n') || 'No databases found'), 'success');
      } catch (err) {
        showStatus('❌ Error: ' + err.message, 'error');
      }
    }

    // Unregister service workers
    async function unregisterServiceWorkers() {
      try {
        if (!navigator.serviceWorker) {
          showStatus('ℹ️ Service Workers not supported in this browser', 'info');
          return;
        }

        const registrations = await navigator.serviceWorker.getRegistrations();
        let unregistered = [];

        for (const reg of registrations) {
          await reg.unregister();
          unregistered.push(reg.scope);
        }

        showStatus('✅ Service Workers unregistered:\n' + (unregistered.join('\n') || 'None found'), 'success');
      } catch (err) {
        showStatus('❌ Error: ' + err.message, 'error');
      }
    }

    // Clear all caches
    async function clearAllCaches() {
      try {
        if (!window.caches) {
          showStatus('ℹ️ Cache API not supported', 'info');
          return;
        }

        const cacheNames = await caches.keys();
        let cleared = [];

        for (const name of cacheNames) {
          await caches.delete(name);
          cleared.push(name);
        }

        showStatus('✅ Caches cleared:\n' + (cleared.join('\n') || 'No caches found'), 'success');
      } catch (err) {
        showStatus('❌ Error: ' + err.message, 'error');
      }
    }

    // Clear EVERYTHING
    async function clearEverything() {
      if (!confirm('This will clear ALL cached data. The page will reload. Continue?')) {
        return;
      }

      showStatus('🧹 Clearing everything...', 'info');

      try {
        // 1. Clear localStorage
        localStorage.clear();

        // 2. Clear sessionStorage
        sessionStorage.clear();

        // 3. Clear IndexedDB
        const databases = await window.indexedDB?.databases?.() || [];
        for (const db of databases) {
          if (db.name) {
            await new Promise((resolve) => {
              const req = window.indexedDB.deleteDatabase(db.name);
              req.onsuccess = () => resolve();
              req.onerror = () => resolve();
            });
          }
        }

        // 4. Unregister service workers
        if (navigator.serviceWorker) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          for (const reg of registrations) {
            await reg.unregister();
          }
        }

        // 5. Clear caches
        if (window.caches) {
          const cacheNames = await caches.keys();
          for (const name of cacheNames) {
            await caches.delete(name);
          }
        }

        // 6. Clear cookies (same-origin only)
        document.cookie.split(';').forEach(cookie => {
          const [name] = cookie.split('=');
          document.cookie = name + '=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/';
        });

        showStatus('✅ ALL cache cleared! Reloading page...', 'success');

        // Hard reload after a short delay
        setTimeout(() => {
          window.location.href = '/?nocache=' + Date.now();
        }, 1500);

      } catch (err) {
        showStatus('❌ Error: ' + err.message, 'error');
      }
    }

    // Auto-clear on first visit with ?clear param
    if (window.location.search.includes('clear')) {
      clearEverything();
    }
  </script>
</body>
</html>
