name: lucky_store
description: A new Flutter project for the Lucky Store.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: 0.19.0
  http: ^1.2.0
  provider: ^6.1.1
  google_fonts: ^6.1.0
  supabase_flutter: ^2.12.4
  file_picker: ^11.0.2
  mime: ^2.0.0
  path_provider: ^2.1.5
  flutter_dotenv: ^6.0.0
  mobile_scanner: ^7.2.0        # POS barcode / QR scanner
  barcode_widget: ^2.0.4        # Render Code128 barcodes in label preview
  pdf: 3.11.3
  printing: ^5.14.3
  flutter_thermal_printer: ^1.2.1+1
  esc_pos_utils_plus: ^2.0.3
  flutter_blue_plus: ^1.31.0
  csv: ^6.0.0
  excel: ^4.0.3
  fl_chart: ^1.1.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env
    - assets/app.env
