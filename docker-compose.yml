version: "3.8"

services:
  admin-web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  seed-db:
    build:
      context: .
      dockerfile: docker/seed-db/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
    profiles:
      - seed
    depends_on:
      - admin-web
