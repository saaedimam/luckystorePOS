name: Replay Governance

on:
  pull_request:
  workflow_dispatch:

jobs:
  static-governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compile
        run: npm run typecheck

      - name: Admin build
        run: npm run build

      - name: Governance check
        run: npm run governance:check

      - name: Compile replay/governance tooling
        run: |
          npx tsc --module commonjs --target es2022 --types node --esModuleInterop --skipLibCheck --noEmit \
            scripts/governance/rpc_parity.ts \
            scripts/replay-certification/db_state_fingerprint.ts \
            scripts/replay-certification/db_replay_runner.ts \
            scripts/replay-certification/replay_consistency_verifier.ts \
            scripts/replay-certification/model.ts

  rpc-parity:
    runs-on: ubuntu-latest
    needs: static-governance
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: RPC parity
        env:
          LOCAL_DATABASE_URL: ${{ secrets.LOCAL_DATABASE_URL }}
          STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          rm -rf .replay-governance-build
          npx tsc --module commonjs --target es2022 --types node --esModuleInterop --skipLibCheck --outDir .replay-governance-build \
            scripts/governance/rpc_parity.ts
          node .replay-governance-build/governance/rpc_parity.js

  replay-consistency:
    runs-on: ubuntu-latest
    needs: static-governance
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Replay consistency verifier
        env:
          REPLAY_DATABASE_URL: ${{ secrets.REPLAY_DATABASE_URL }}
          REPLAY_DB_ALLOW_MUTATION: ${{ secrets.REPLAY_DB_ALLOW_MUTATION }}
        run: |
          rm -rf .replay-governance-build
          npx tsc --module commonjs --target es2022 --types node --esModuleInterop --skipLibCheck --outDir .replay-governance-build \
            scripts/replay-certification/db_state_fingerprint.ts \
            scripts/replay-certification/db_replay_runner.ts \
            scripts/replay-certification/replay_consistency_verifier.ts \
            scripts/replay-certification/model.ts
          node .replay-governance-build/replay-certification/replay_consistency_verifier.js

  flutter-analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        working-directory: apps/mobile_app
        run: flutter pub get

      - name: Flutter analyze
        working-directory: apps/mobile_app
        run: flutter analyze lib integration_test
