name: CI

# Flutter CI is handled separately in flutter-ci.yml.
# This workflow covers admin_web (web app) checks only.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  admin_web_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/admin_web/package-lock.json
      - name: Install dependencies
        run: |
          cd apps/admin_web
          npm ci
      - name: TypeScript check (strict, no emit)
        run: |
          cd apps/admin_web
          npx tsc --noEmit
      - name: Lint
        run: |
          cd apps/admin_web
          npm run lint
      - name: Production build (fail-fast on compile errors)
        run: |
          cd apps/admin_web
          npm run build
